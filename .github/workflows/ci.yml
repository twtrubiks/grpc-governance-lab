# CI:每次 push / PR 跑格式檢查、vet、lint、race 測試、覆蓋率門檻,
# 並用 docker compose 煙霧測試驗證 README 首頁宣稱的一鍵啟動。
# 本機等價指令:make check
#
# Actions 一律以 commit SHA 釘選(供應鏈安全),版本註解在行末。
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      # gofmt 有 diff 就直接 fail,保證倉庫永遠是標準格式
      - name: fmt
        run: test -z "$(gofmt -s -l .)" || (gofmt -s -l . && exit 1)

      - name: vet
        run: go vet ./...

      - name: lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8

      # -race 是底線:balancer / registry 全是併發代碼
      - name: test
        run: go test -race ./...

      # 覆蓋率門檻:pkg/ 是治理層核心,低於 80% 直接 fail(對齊 docs/CODE_QUALITY.md §5)
      - name: coverage gate
        run: |
          set -euo pipefail
          go test -coverprofile=coverage.out ./pkg/...
          pct=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "pkg/ 覆蓋率:${pct}%"
          awk "BEGIN{exit !(${pct} >= 80)}" || { echo "覆蓋率 ${pct}% 低於門檻 80%"; exit 1; }

  # 煙霧測試:驗證 README「docker compose up 一鍵啟動 + 聚合 API」真的能跑。
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: build and start
        run: docker compose up --build -d

      - name: smoke test
        run: |
          set -euo pipefail
          # gateway 要等 account/relation 都健康後才起,給足重試
          for i in $(seq 1 60); do
            if curl -fsS "http://localhost:8080/user/profile?id=1" -o /tmp/profile.json; then
              break
            fi
            sleep 2
          done
          echo "profile: $(cat /tmp/profile.json)"
          # 主資料來自 account,且 relation 正常 → 未降級
          grep -q 'user-1' /tmp/profile.json
          grep -q '"degraded":false' /tmp/profile.json
          # 觀測端點要看得到後端節點(場景 3/5/6 的演示靠它)
          curl -fsS "http://localhost:8080/debug/backends" -o /tmp/backends.json
          echo "backends: $(cat /tmp/backends.json)"
          grep -q 'account' /tmp/backends.json

      - name: dump logs on failure
        if: failure()
        run: docker compose logs

      - name: teardown
        if: always()
        run: docker compose down -v
